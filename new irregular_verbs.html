<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Irregular Verbs Trainer</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#eaf6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    color:#2d6cdf;
}

.progress{
    color:#666;
    margin-bottom:20px;
}

.base{
    font-size:42px;
    font-weight:bold;
    color:#2d6cdf;
    margin:30px 0;
}

.past{
    font-size:36px;
    color:#27ae60;
    margin:25px 0;
    min-height:50px;
}

button{
    background:#4da6ff;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 24px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

button:hover{
    background:#2d8cff;
}

.hidden{
    visibility:hidden;
}

.finish{
    font-size:24px;
    color:#27ae60;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.nameInput{
    width:90%;
    max-width:360px;
    padding:14px 18px;
    border:2px solid #b7ddff;
    border-radius:14px;
    font-size:20px;
    text-align:center;
    outline:none;
    margin:20px 0 10px;
}

.nameInput:focus{
    border-color:#4da6ff;
}

.error{
    color:#d64545;
    font-weight:bold;
    min-height:24px;
    margin-top:8px;
}

.studentName{
    color:#2d6cdf;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

    <div id="startScreen">

        <h1>🎧 Irregular Verbs</h1>

        <p>Enter your name to start the game.</p>

        <input id="studentNameInput" class="nameInput" type="text" placeholder="Your name" autocomplete="off">

        <br>

        <button id="startGameBtn">Start Game</button>

        <div id="nameError" class="error"></div>

    </div>

    <div id="trainer" style="display:none;">

        <h1>🎧 Irregular Verbs</h1>

        <div class="studentName" id="studentNameOnScreen"></div>

        <div class="progress" id="progress"></div>

        <div>
            <strong>Base form:</strong>
        </div>

        <div class="base" id="baseWord"></div>

        <button id="listenBtn">🔊 Listen</button>

        <div class="past" id="pastWord"></div>

        <button id="nextBtn" class="hidden">➡️ Next</button>

    </div>

    <div id="finishScreen" style="display:none;">

        <div class="finish">🎉 Great job!</div>

        <p>You learned 8 irregular verbs.</p>

        <table>
            <tr>
                <th>Base</th>
                <th>Past Simple</th>
            </tr>
            <tbody id="summary"></tbody>
        </table>

        <button onclick="restart()">🔄 Start Again</button>

    </div>

</div>

<script>
const LOG_URL = "https://script.google.com/macros/s/AKfycbze5szpz0ury7t9AzXgypraI0bqWnb_beGCryE4gfIZTJ8y7giHTQP54U3Mqy6PtOh-Cg/exec";

const verbs = [
    {base:"see", past:"saw"},
    {base:"buy", past:"bought"},
    {base:"sit", past:"sat"},
    {base:"say", past:"said"},
    {base:"tell", past:"told"},
    {base:"make", past:"made"},
    {base:"take", past:"took"},
    {base:"speak", past:"spoke"}
];

let current = 0;
let answerShown = false;
let studentName = "";
let gameCompletedLogged = false;

const startScreen = document.getElementById("startScreen");
const trainer = document.getElementById("trainer");
const studentNameInput = document.getElementById("studentNameInput");
const startGameBtn = document.getElementById("startGameBtn");
const nameError = document.getElementById("nameError");
const studentNameOnScreen = document.getElementById("studentNameOnScreen");

const baseWord = document.getElementById("baseWord");
const pastWord = document.getElementById("pastWord");
const progress = document.getElementById("progress");
const listenBtn = document.getElementById("listenBtn");
const nextBtn = document.getElementById("nextBtn");

function sendLog(pageName){
    const params = new URLSearchParams();
    params.append("name", studentName || "No name");
    params.append("game", "Irregular verbs trainer");
    params.append("page", pageName);

    fetch(LOG_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: params.toString()
    }).catch(() => {});
}

function enterGame(){
    const name = studentNameInput.value.trim();

    if(!name){
        nameError.textContent = "Enter your name";
        studentNameInput.focus();
        return;
    }

    studentName = name;
    gameCompletedLogged = false;
    studentNameOnScreen.textContent = studentName;

    startScreen.style.display = "none";
    trainer.style.display = "block";

    sendLog("Game opened");
    loadVerb();
}

startGameBtn.addEventListener("click", enterGame);

studentNameInput.addEventListener("keydown", (event) => {
    if(event.key === "Enter"){
        enterGame();
    }
});

function loadVerb(){
    answerShown = false;
    progress.textContent = `${current + 1} / ${verbs.length}`;
    baseWord.textContent = verbs[current].base;
    pastWord.textContent = "";
    nextBtn.classList.add("hidden");
}

function speak(text){
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    speechSynthesis.speak(utterance);
}

listenBtn.addEventListener("click", () => {
    speak(verbs[current].past);

    if (!answerShown) {
        answerShown = true;

        setTimeout(() => {
            pastWord.textContent = verbs[current].past;
            nextBtn.classList.remove("hidden");
        }, 1000);
    }
});

nextBtn.addEventListener("click", () => {
    current++;

    if(current >= verbs.length){
        showFinish();
        return;
    }

    loadVerb();
});

function showFinish(){
    document.getElementById("trainer").style.display = "none";
    document.getElementById("finishScreen").style.display = "block";

    if(!gameCompletedLogged){
        gameCompletedLogged = true;
        sendLog("Game completed");
    }

    const summary = document.getElementById("summary");

    summary.innerHTML = verbs.map(v => `
        <tr>
            <td>${v.base}</td>
            <td>${v.past}</td>
        </tr>
    `).join("");
}

function restart(){
    current = 0;
    gameCompletedLogged = false;

    document.getElementById("finishScreen").style.display = "none";
    document.getElementById("trainer").style.display = "block";

    loadVerb();
}

studentNameInput.focus();
</script>

</body>
</html>
